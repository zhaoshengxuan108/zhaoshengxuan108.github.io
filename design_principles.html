---
layout: default
title: 设计原则
---
<h1>{{ page.title }}</h1>

<ul>
	{% assign filtered_posts = site.posts | where: 'categories', 'design_principles' %}
	{% for post in filtered_posts %}
    <li>
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p>{{ post.excerpt }}</p>
    </li>
    {% endfor %}
</ul>
