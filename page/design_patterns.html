---
layout: default
title: 设计模式
position: Developer
---
<h1>{{ page.title }}</h1>
<ul>
	{% assign filtered_posts = site.posts | where: 'categories', 'design_patterns' %}
	{% for post in filtered_posts %}
    <li>
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p>{{ post.excerpt }}</p>
    </li>
    {% endfor %}
</ul>
